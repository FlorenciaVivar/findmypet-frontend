<div class="fixed inset-0 bg-slate-900/60 backdrop-blur-xs flex items-end justify-center z-50 p-0 sm:p-4">
  <div class="bg-white w-full max-w-lg rounded-t-3xl sm:rounded-2xl shadow-xl flex flex-col max-h-[92vh] overflow-hidden">

    <div class="flex items-center justify-between px-5 py-4 border-b border-slate-100 bg-slate-50">
      <div class="flex items-center gap-1.5">
        <h3 class="font-bold text-slate-800 text-base">Publicar Mascota Perdida</h3>
      </div>
      <button (click)="closeForm.emit()" class="p-1.5 rounded-full bg-slate-200/80 text-slate-500 hover:bg-slate-200">
        🗙
      </button>
    </div>

    <form [formGroup]="petForm" (ngSubmit)="handleSubmit()" class="flex-1 overflow-y-auto p-5 space-y-4">

      <div class="space-y-1.5">
        <label class="block text-xs font-bold text-slate-700 uppercase tracking-wide">Foto de la mascota *</label>

        @if (imageUrl()) {
          <div class="relative h-44 rounded-xl overflow-hidden group">
            <img [src]="imageUrl()" alt="Mascota" class="w-full h-full object-cover" />
            <button type="button" (click)="removeImage()" class="absolute top-2 right-2 bg-black/70 hover:bg-black/80 text-white p-1 rounded-full">
              🗙
            </button>
          </div>
        } @else {
          <div class="border-2 border-dashed border-slate-200 hover:border-red-500 rounded-xl h-36 flex flex-col items-center justify-center bg-slate-50 transition cursor-pointer relative">
            <input type="file" accept="image/*" (change)="handleImageChange($event)" class="absolute inset-0 opacity-0 cursor-pointer" />
            <span class="text-xs text-slate-600 font-medium">Subir foto de tu mascota</span>
            <span class="text-[10px] text-slate-400 mt-1">Imágenes nítidas ayudan a la comparación</span>
          </div>
        }
      </div>

      <div class="grid grid-cols-2 gap-3">
        <div class="space-y-1">
          <label class="block text-xs font-bold text-slate-700 uppercase tracking-wide">Nombre *</label>
          <input type="text" formControlName="name" placeholder="Ej. Bobby" class="w-full text-xs px-3 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:border-red-500 font-medium" />
        </div>
        <div class="space-y-1">
          <label class="block text-xs font-bold text-slate-700 uppercase tracking-wide">Especie *</label>
          <select formControlName="species" class="w-full text-xs px-3 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:border-red-500 font-semibold bg-white">
            <option value="perro">🐶 Perro</option>
            <option value="gato">🐱 Gato</option>
            <option value="otro">🐾 Otro</option>
          </select>
        </div>
      </div>

      <div class="grid grid-cols-2 gap-3">
        <div class="space-y-1">
          <label class="block text-xs font-bold text-slate-700 uppercase tracking-wide">Raza / Tipo *</label>
          <input type="text" formControlName="breed" placeholder="Ej. Mestizo, Caniche..." class="w-full text-xs px-3 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:border-red-500 font-medium" />
        </div>
        <div class="space-y-1">
          <label class="block text-xs font-bold text-slate-700 uppercase tracking-wide">Color de pelaje</label>
          <input type="text" formControlName="color" placeholder="Ej. Marrón con negro" class="w-full text-xs px-3 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:border-red-500 font-medium" />
        </div>
      </div>

      <div class="grid grid-cols-2 gap-3">
        <div class="space-y-1">
          <label class="block text-xs font-bold text-slate-700 uppercase tracking-wide">Fecha de pérdida *</label>
          <input type="date" formControlName="lostDate" class="w-full text-xs px-3 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:border-red-500 font-semibold text-slate-700" />
        </div>
        <div class="space-y-1">
          <label class="block text-xs font-bold text-slate-700 uppercase tracking-wide">Tel. de contacto *</label>
          <input type="text" formControlName="contactPhone" placeholder="Ej. +54 9 11..." class="w-full text-xs px-3 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:border-red-500 font-medium" />
        </div>
      </div>

      <div class="grid grid-cols-1 gap-3">
        <div class="space-y-1">
          <label class="block text-xs font-bold text-slate-700 uppercase tracking-wide">Zona o Barrio de pérdida *</label>
          <input type="text" formControlName="locationName" placeholder="Ej. Palermo, Buenos Aires" class="w-full text-xs px-3 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:border-red-500 font-medium" />
        </div>

        <div class="space-y-1.5">
          <div class="flex items-center justify-between">
            <label class="block text-[11px] font-bold text-slate-600 uppercase tracking-wide">Ubicación exacta en el mapa</label>
            <button type="button" (click)="toggleMap()" class="text-xs text-red-600 font-semibold flex items-center gap-1 hover:underline">
              {{ showMap() ? 'Ocultar mapa' : 'Ver mapa interactivo' }}
            </button>
          </div>

          @if (showMap()) {
            <div class="h-44 w-full">
              <app-interactive-map
                [pets]="[]"
                [pickerMode]="true"
                [center]="[latitude, longitude]"
                [zoom]="12"
                (coordinatesSelected)="handleCoordinatesSelected($event)">
              </app-interactive-map>
            </div>
          } @else {
            <div class="bg-slate-50 rounded-xl p-3 border border-slate-100 flex items-center justify-between text-xs">
              <span class="text-slate-600">📍 Ubicación: {{ latitude.toFixed(4) }}, {{ longitude.toFixed(4) }}</span>
              <button type="button" (click)="toggleMap()" class="bg-white hover:bg-slate-100 text-slate-700 font-medium px-2.5 py-1 rounded-lg shadow-sm border border-slate-200">
                Establecer mapa
              </button>
            </div>
          }
        </div>
      </div>

      <div class="space-y-1">
        <label class="block text-xs font-bold text-slate-700 uppercase tracking-wide">Detalles y descripción física</label>
        <textarea formControlName="description" placeholder="Ej. Cojea de la pata trasera..." rows="3" class="w-full text-xs p-3 rounded-xl border border-slate-200 focus:outline-none focus:border-red-500 font-medium"></textarea>
      </div>

      <div class="pt-2">
        <button type="submit" [disabled]="petForm.invalid || isSubmitting()" class="w-full bg-red-600 text-white rounded-xl py-3 font-semibold hover:bg-red-700 transition flex items-center justify-center gap-2 disabled:bg-slate-300 shadow-lg text-sm">
          @if (isSubmitting()) {
            <span>Publicando alerta de mascota...</span>
          } @else {
            <span>Publicar Pérdida</span>
          }
        </button>
      </div>

    </form>
  </div>
</div>
