<div class="fixed inset-0 bg-slate-900/60 backdrop-blur-xs flex items-center justify-center z-50 p-4">
  <div class="bg-white w-full max-w-sm rounded-2xl shadow-xl overflow-hidden border border-slate-100 flex flex-col relative">

    <div class="bg-slate-950 text-white p-6 relative overflow-hidden shrink-0">
      <div class="absolute top-0 right-0 w-36 h-36 bg-red-500/15 rounded-full blur-2xl"></div>
      <div class="relative z-10 flex flex-col items-center text-center">
        <h3 class="font-display font-bold text-lg text-slate-100">
          {{ isLogin() ? 'Acceso' : 'Crear Cuenta de Comunidad' }}
        </h3>
        <p class="text-xs text-slate-400 mt-1">
          {{ isLogin() ? 'Ingresa para reportar pérdidas o gestionar alertas' : 'Únete para ayudar a reunir familias de mascotas' }}
        </p>
      </div>
    </div>

    <form [formGroup Pall] [formGroup]="authForm" (ngSubmit)="handleSubmit()" class="p-6 space-y-4">

      @if (errorMessage()) {
        <div class="bg-red-50 border border-red-200 text-red-700 text-xs p-3 rounded-xl flex items-center gap-2">
          <span>{{ errorMessage() }}</span>
        </div>
      }

      @if (successMessage()) {
        <div class="bg-emerald-50 border border-emerald-200 text-emerald-700 text-xs p-3 rounded-xl flex items-center gap-2">
          <span>{{ successMessage() }}</span>
        </div>
      }

      @if (!isLogin()) {
        <div class="space-y-1">
          <label class="block text-[10px] font-bold text-slate-700 uppercase tracking-wider">Nombre Completo</label>
          <input type="text" formControlName="fullName" placeholder="Ej. Daiana Vivar"
                 class="w-full text-xs px-3 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:border-red-500 font-semibold" />
        </div>
      }

      <div class="space-y-1">
        <label class="block text-[10px] font-bold text-slate-700 uppercase tracking-wider">Correo Electrónico</label>
        <input type="email" formControlName="email" placeholder="Ej. dueno@mascotas.com"
               class="w-full text-xs px-3 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:border-red-500 font-semibold" />
      </div>

      <div class="space-y-1">
        <label class="block text-[10px] font-bold text-slate-700 uppercase tracking-wider">Contraseña</label>
        <input type="password" formControlName="password" placeholder="Escribe tu contraseña"
               class="w-full text-xs px-3 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:border-red-500 font-semibold" />
      </div>

      <button type="submit" [disabled]="authForm.invalid || isLoading()"
              class="w-full bg-red-600 hover:bg-red-700 text-white rounded-xl py-3 font-semibold transition text-xs flex items-center justify-center gap-2 disabled:bg-slate-300">
        @if (isLoading()) {
          <div class="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
        } @else {
          <span>{{ isLogin() ? 'Iniciar Sesión' : 'Registrar Cuenta' }}</span>
        }
      </button>

      <div class="text-center pt-2">
        <button type="button" (click)="toggleMode()" class="text-xs text-slate-500 hover:text-red-600 transition">
          @if (isLogin()) {
            ¿No tienes cuenta? <span class="font-semibold text-red-600">Regístrate</span>
          } @else {
            ¿Ya estás registrado? <span class="font-semibold text-red-600">Inicia sesión</span>
          }
        </button>
      </div>

      <button type="button" (click)="closeModal.emit()"
              class="w-full border border-slate-200 hover:bg-slate-50 text-slate-600 font-semibold py-2 rounded-xl text-xs transition">
        Cancelar
      </button>
    </form>
  </div>
</div>
